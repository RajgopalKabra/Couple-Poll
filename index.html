<html lang="en">

<title>Couple Poll — Shreya & Yashvardhan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --rose: #C2507A; --rose-light: #F4D6E3; --rose-dark: #8B2D51;
  --gold: #C9963A; --gold-light: #F5EDDA; --cream: #FDF8F2;
  --charcoal: #2C2825; --muted: #8B7E76;
  --husband: #4A7FB5; --husband-light: #D6E8F7;
  --wife: #C2507A; --wife-light: #F4D6E3;
  --green: #2E7D4F; --green-light: #D4EDDA;
}
body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--charcoal); min-height: 100vh; }
.screen { display: none; min-height: 100vh; padding: 1.5rem 1rem 3rem; }
.screen.active { display: block; }
.header { text-align: center; margin-bottom: 1.75rem; }
.ornament { font-size: 1.1rem; color: var(--gold); letter-spacing: 6px; }
h1 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem,5vw,2.3rem); color: var(--rose-dark); line-height: 1.2; margin: 0.4rem 0; }
h1 em { font-style: italic; color: var(--gold); }
.subtitle { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; margin-top: 0.3rem; }
.divider { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); margin: 0.75rem auto; }
.card { background: white; border-radius: 18px; padding: 1.4rem; box-shadow: 0 2px 16px rgba(194,80,122,0.08); border: 1px solid var(--rose-light); margin-bottom: 1.25rem; max-width: 580px; margin-left: auto; margin-right: auto; }
.home-btns { display: flex; flex-direction: column; gap: 12px; max-width: 340px; margin: 0 auto; }
.big-btn { padding: 1.1rem 1.5rem; border-radius: 14px; border: none; font-family: 'DM Sans', sans-serif; font-size: 1rem; font-weight: 500; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; display: flex; align-items: center; justify-content: center; gap: 10px; }
.big-btn:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
.btn-host { background: var(--rose-dark); color: white; }
.btn-voter { background: var(--husband); color: white; }
.btn-sm { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--muted); background: transparent; color: var(--muted); font-size: 0.82rem; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; display: inline-block; margin-top: 0.5rem; }
.btn-sm:hover { border-color: var(--rose); color: var(--rose); }
.host-ctrl { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 1.25rem; }
.ctrl-btn { padding: 10px 20px; border-radius: 10px; border: none; font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.ctrl-btn:hover:not(:disabled) { transform: translateY(-1px); }
.ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-prev { background: #EEE8E1; color: var(--muted); }
.btn-next { background: var(--rose-dark); color: white; }
.btn-end  { background: var(--green-light); color: var(--green); border: 1px solid #A8D5B8; }
.active-badge { font-size: 0.8rem; padding: 5px 12px; border-radius: 20px; background: var(--gold-light); color: var(--gold); font-weight: 500; }
.q-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.q-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 10px; border: 1px solid #EEE8E1; background: var(--cream); font-size: 0.84rem; }
.q-item.released { background: #F0FAF3; border-color: #A8D5B8; color: var(--green); }
.q-item.active-q { border-color: var(--rose); background: var(--rose-light); font-weight: 500; color: var(--rose-dark); }
.q-item.locked { opacity: 0.42; }
.q-num-badge { width: 22px; height: 22px; border-radius: 50%; background: var(--gold-light); color: var(--gold); font-size: 0.7rem; font-weight: 500; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.q-item.active-q .q-num-badge { background: var(--rose); color: white; }
.q-item.released .q-num-badge { background: #A8D5B8; color: var(--green); }
.q-status { margin-left: auto; font-size: 0.72rem; color: var(--muted); white-space: nowrap; }
.q-item.released .q-status { color: var(--green); }
.legend { display: flex; gap: 1.5rem; margin-bottom: 1rem; font-size: 0.8rem; color: var(--muted); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; vertical-align: middle; }
.result-row { margin-bottom: 1rem; }
.result-q { font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.bar-track { display: flex; border-radius: 6px; overflow: hidden; height: 28px; gap: 2px; }
.bar-h { background: var(--husband-light); display: flex; align-items: center; padding: 0 8px; font-size: 0.78rem; font-weight: 500; color: var(--husband); min-width: 36px; transition: flex 0.5s; }
.bar-w { background: var(--wife-light); display: flex; align-items: center; justify-content: flex-end; padding: 0 8px; font-size: 0.78rem; font-weight: 500; color: var(--wife); min-width: 36px; transition: flex 0.5s; }
.qr-section { text-align: center; }
.qr-section h3 { font-family: 'Playfair Display', serif; font-size: 1.1rem; margin-bottom: 0.4rem; }
.qr-section p { font-size: 0.82rem; color: var(--muted); margin-bottom: 1rem; }
#qrcode { display: inline-block; padding: 10px; background: white; border-radius: 12px; border: 1px solid var(--rose-light); }
.poll-url { margin-top: 0.75rem; font-size: 0.72rem; color: var(--rose); word-break: break-all; font-family: monospace; background: var(--rose-light); padding: 8px 12px; border-radius: 8px; }
.q-image-wrap { width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 1.25rem; }
.q-image-wrap svg { width: 100%; display: block; }
.q-number { font-size: 0.72rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
.q-text { font-family: 'Playfair Display', serif; font-size: clamp(1.05rem,3.5vw,1.4rem); color: var(--charcoal); line-height: 1.4; margin-bottom: 1.4rem; }
.vote-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.vote-btn { padding: 1rem; border-radius: 14px; border: 2px solid transparent; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; gap: 8px; }
.husband-btn { background: var(--husband-light); color: var(--husband); border-color: var(--husband-light); }
.husband-btn:hover { border-color: var(--husband); transform: translateY(-2px); }
.wife-btn { background: var(--wife-light); color: var(--wife); border-color: var(--wife-light); }
.wife-btn:hover { border-color: var(--wife); transform: translateY(-2px); }
.voted-banner { background: var(--green-light); border-radius: 12px; padding: 14px 16px; color: var(--green); font-weight: 500; font-size: 0.92rem; text-align: center; margin-bottom: 1rem; }
.waiting-dots { display: flex; justify-content: center; gap: 7px; margin-top: 0.75rem; }
.waiting-dots span { width: 9px; height: 9px; border-radius: 50%; background: var(--rose-light); animation: blink 1.4s ease-in-out infinite; }
.waiting-dots span:nth-child(2) { animation-delay: 0.22s; }
.waiting-dots span:nth-child(3) { animation-delay: 0.44s; }
@keyframes blink { 0%,80%,100%{background:var(--rose-light)} 40%{background:var(--rose)} }
.done-card { text-align: center; padding: 2.5rem 1rem; }
.done-card h2 { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.8rem; color: var(--rose-dark); margin-bottom: 0.5rem; }
.status-bar { max-width: 580px; margin: 0 auto 1rem; padding: 8px 14px; border-radius: 10px; font-size: 0.8rem; text-align: center; }
.status-connecting { background: var(--gold-light); color: var(--gold); }
.status-live { background: var(--green-light); color: var(--green); }
.status-error { background: #FDECEA; color: #B71C1C; }
footer { text-align: center; font-family: 'Playfair Display', serif; font-style: italic; color: var(--muted); font-size: 0.82rem; padding: 1.5rem 0 2rem; }
</style>
</head>

</div>

];

/* ─── STATE ─── */
let pollState = null;
let myVotedQ  = -1;
let realtimeSub = null;

function freshState() {
  return { active_q: 0, ended: false, votes: QUESTIONS.map(() => ({ h: 0, w: 0 })) };
}

/* ─── NAVIGATION ─── */
function goTo(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function setStatus(elId, type, msg) {
  const el = document.getElementById(elId);
  if (!el) return;
  el.className = 'status-bar status-' + type;
  el.textContent = msg;
}

/* ─── SUPABASE HELPERS ─── */
async function loadState() {
  const { data, error } = await sb.from('poll_state').select('*').eq('id', 'main').single();
  if (error) throw error;
  if (!data.votes || !Array.isArray(data.votes) || data.votes.length !== QUESTIONS.length) {
    data.votes = QUESTIONS.map(() => ({ h: 0, w: 0 }));
  }
  return data;
}

async function updateState(changes) {
  const { error } = await sb.from('poll_state').update(changes).eq('id', 'main');
  if (error) throw error;
}

function subscribeRealtime(onUpdate) {
  if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
  realtimeSub = sb.channel('poll-changes')
    .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'poll_state' }, payload => {
      const d = payload.new;
      if (!d.votes || !Array.isArray(d.votes) || d.votes.length !== QUESTIONS.length) {
        d.votes = QUESTIONS.map(() => ({ h: 0, w: 0 }));
      }
      onUpdate(d);
    })
    .subscribe();
}

function unsubRealtime() {
  if (realtimeSub) { sb.removeChannel(realtimeSub); realtimeSub = null; }
}

/* ─── HOST ─── */
function openHost() {
  goTo('screen-host');
  generateQR();
  setStatus('host-status', 'connecting', 'Connecting to Supabase...');
  loadState().then(s => {
    pollState = s;
    setStatus('host-status', 'live', '🟢 Live — changes sync to all guests instantly');
    buildQList(s);
    renderResults(s);
    subscribeRealtime(s => {
      pollState = s;
      buildQList(s);
      renderResults(s);
    });
  }).catch(e => setStatus('host-status', 'error', '⚠ ' + e.message));
}

function closeHost() {
  unsubRealtime();
  goTo('screen-home');
}

function buildQList(s) {
  const ul = document.getElementById('q-list');
  ul.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const isActive = !s.ended && i === s.active_q;
    const isDone   = i < s.active_q || s.ended;
    const isLocked = !s.ended && i > s.active_q;
    const li = document.createElement('li');
    li.className = 'q-item' + (isActive ? ' active-q' : isDone ? ' released' : isLocked ? ' locked' : '');
    const status = isActive ? '● Live' : isDone ? '✓ Done' : '🔒';
    const v = s.votes[i] || { h: 0, w: 0 };
    li.innerHTML = `<span class="q-num-badge">${i+1}</span><span style="flex:1">${q.text}</span><span class="q-status">${status} · ${v.h+v.w}v</span>`;
    ul.appendChild(li);
  });
  document.getElementById('btn-prev').disabled = s.active_q === 0 || s.ended;
  document.getElementById('btn-next').disabled = s.active_q >= QUESTIONS.length - 1 || s.ended;
  document.getElementById('btn-end').disabled  = s.ended;
  document.getElementById('active-badge').textContent = s.ended ? 'Poll ended' : `Q${s.active_q + 1} of ${QUESTIONS.length}`;
}

function renderResults(s) {
  const el = document.getElementById('results-list');
  el.innerHTML = '';
  QUESTIONS.forEach((q, i) => {
    const v = s.votes[i] || { h: 0, w: 0 };
    const total = v.h + v.w;
    const hP = total ? Math.round(v.h / total * 100) : 50;
    const wP = 100 - hP;
    el.innerHTML += `<div class="result-row">
      <div class="result-q">${i+1}. ${q.text}</div>
      <div class="bar-track">
        <div class="bar-h" style="flex:${hP}">♂ ${total ? hP+'%' : '–'}</div>
        <div class="bar-w" style="flex:${wP}">${total ? wP+'%' : '–'} ♀</div>
      </div></div>`;
  });
}

function nextQ() {
  if (!pollState || pollState.active_q >= QUESTIONS.length - 1 || pollState.ended) return;
  updateState({ active_q: pollState.active_q + 1 });
}
function prevQ() {
  if (!pollState || pollState.active_q <= 0 || pollState.ended) return;
  updateState({ active_q: pollState.active_q - 1 });
}
function endPoll() {
  if (!confirm('End the poll for all guests?')) return;
  updateState({ ended: true });
}
function resetPoll() {
  if (!confirm('Reset all votes and start over?')) return;
  myVotedQ = -1;
  const f = freshState();
  updateState({ active_q: f.active_q, ended: f.ended, votes: f.votes });
}

/* ─── QR ─── */
function generateQR() {
  const url = window.location.href.split('?')[0] + '?vote=1';
  document.getElementById('poll-url-display').textContent = url;
  const el = document.getElementById('qrcode');
  el.innerHTML = '';
  new QRCode(el, { text: url, width: 180, height: 180, colorDark: '#2C2825', colorLight: '#ffffff', correctLevel: QRCode.CorrectLevel.M });
}

/* ─── VOTER ─── */
function openVoter() {
  goTo('screen-voter');
  myVotedQ = -1;
  setStatus('voter-status', 'connecting', 'Connecting...');
  document.getElementById('voter-content').innerHTML = '';

  loadState().then(s => {
    pollState = s;
    setStatus('voter-status', 'live', '🟢 Live');
    renderVoter(s);
    subscribeRealtime(s => {
      pollState = s;
      renderVoter(s);
    });
  }).catch(e => setStatus('voter-status', 'error', '⚠ Connection error'));
}

function closeVoter() {
  unsubRealtime();
  goTo('screen-home');
}

function renderVoter(s) {
  const el = document.getElementById('voter-content');
  if (s.ended) {
    el.innerHTML = `<div class="card done-card">
      <div style="font-size:2.8rem;margin-bottom:1rem">🎉</div>
      <h2>That's a wrap!</h2>
      <p style="color:var(--muted);margin-top:0.5rem;font-size:0.9rem">Thanks for playing! The host will reveal the results.</p>
    </div>`;
    return;
  }
  const qIdx = s.active_q;
  const q = QUESTIONS[qIdx];
  if (myVotedQ === qIdx) {
    el.innerHTML = `<div class="card">
      <div class="q-image-wrap">${q.svg}</div>
      <div class="q-number">Question ${qIdx+1} of ${QUESTIONS.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="voted-banner">✓ Vote recorded!</div>
      <p style="text-align:center;font-size:0.84rem;color:var(--muted);margin-bottom:0.5rem">Waiting for next question...</p>
      <div class="waiting-dots"><span></span><span></span><span></span></div>
    </div>`;
    return;
  }
  el.innerHTML = `<div class="card">
    <div class="q-image-wrap">${q.svg}</div>
    <div class="q-number">Question ${qIdx+1} of ${QUESTIONS.length}</div>
    <div class="q-text">${q.text}</div>
    <div class="vote-row">
      <button class="vote-btn husband-btn" onclick="castVote('h',${qIdx})">♂ Husband</button>
      <button class="vote-btn wife-btn"    onclick="castVote('w',${qIdx})">♀ Wife</button>
    </div>
  </div>`;
}

async function castVote(choice, qIdx) {
  if (myVotedQ === qIdx) return;
  myVotedQ = qIdx;
  renderVoter({ ...pollState, active_q: qIdx });
  const fresh = await loadState();
  const votes = [...fresh.votes];
  votes[qIdx] = { h: (votes[qIdx].h||0) + (choice==='h'?1:0), w: (votes[qIdx].w||0) + (choice==='w'?1:0) };
  await updateState({ votes });
}

/* ─── INIT ─── */
generateQR();
if (window.location.search.includes('vote=1')) openVoter();
</script>
